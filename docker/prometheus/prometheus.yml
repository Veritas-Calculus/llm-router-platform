global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: "llm-router"
    metrics_path: "/internal/metrics"
    static_configs:
      - targets: ["server:8080"]
        labels:
          service: "llm-router-server"
