global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical'
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Configure your notification channel here, e.g.:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/...'
    #     channel: '#alerts'
    # webhook_configs:
    #   - url: 'http://server:8080/api/v1/alerts/webhook'

  - name: 'critical'
    # Configure urgent notifications here, e.g.:
    # pagerduty_configs:
    #   - service_key: '<your-pagerduty-key>'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
