# LLM Router Platform — Helm Values
# Override these in values-production.yaml or via --set

# ─── Server (Go Backend) ─────────────────────────────────────
server:
  replicaCount: 2
  image:
    repository: ghcr.io/your-org/llm-router-server
    tag: ""  # Defaults to Chart.AppVersion
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  port: 8080
  env:
    GIN_MODE: release
    LOG_LEVEL: info
    LOG_FORMAT: json
    RATE_LIMIT_ENABLED: "true"
    RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
    HEALTH_CHECK_ENABLED: "true"
    HEALTH_CHECK_INTERVAL: "60"
    CORS_ORIGINS: ""
    REGISTRATION_MODE: "open"         # open | invite | closed
    JWT_EXPIRES_IN: "24h"
    ADMIN_NAME: "Administrator"
    DB_SSL_MODE: "prefer"             # prefer | require | verify-full

# ─── Web (React Frontend) ────────────────────────────────────
web:
  replicaCount: 2
  image:
    repository: ghcr.io/your-org/llm-router-web
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  port: 80

# ─── PostgreSQL ───────────────────────────────────────────────
postgresql:
  # Set to false to use an external database
  enabled: true
  auth:
    database: llm_router
    # These are set via Secret; define here only for internal PG subchart
    existingSecret: llm-router-secrets
    secretKeys:
      userPasswordKey: db-password
  primary:
    persistence:
      size: 10Gi
      storageClass: ""

# ─── Redis ────────────────────────────────────────────────────
redis:
  enabled: true
  auth:
    existingSecret: llm-router-secrets
    existingSecretPasswordKey: redis-password
  master:
    persistence:
      size: 2Gi

# ─── Secrets (must be provided) ──────────────────────────────
secrets:
  # These will be stored in a Kubernetes Secret
  dbPassword: "CHANGEME_SECRET"       # Required
  redisPassword: "CHANGEME_SECRET"    # Required
  jwtSecret: "CHANGEME_SECRET_AT_LEAST_32_CHARS"        # Required (at least 32 chars)
  encryptionKey: "CHANGEME_SECRET_32_BYTES_AES256"    # Required (32 bytes for AES-256)
  adminEmail: "admin@example.com"
  adminPassword: "CHANGEME_SECRET"    # Required

# ─── Ingress ─────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  host: llm-router.example.com
  tls:
    enabled: true
    secretName: llm-router-tls

# ─── Autoscaling ─────────────────────────────────────────────
autoscaling:
  server:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  web:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80

# ─── Pod Disruption Budget ───────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ─── Database Backup ─────────────────────────────────────────
backup:
  enabled: false
  schedule: "0 2 * * *"  # 2 AM daily
  retention: 30           # Days to keep backups
  s3:
    bucket: ""
    region: ""
    endpoint: ""          # For MinIO/S3-compatible
    existingSecret: ""    # Secret with AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY

# ─── Service Monitor (Prometheus Operator) ───────────────────
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}
