{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  labels:
    {{- include "llm-router.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          # API and LLM endpoints → server
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-server
                port:
                  number: {{ .Values.server.port }}
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-server
                port:
                  number: {{ .Values.server.port }}
          # Operational endpoints → server
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ .Release.Name }}-server
                port:
                  number: {{ .Values.server.port }}
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ .Release.Name }}-server
                port:
                  number: {{ .Values.server.port }}
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ .Release.Name }}-server
                port:
                  number: {{ .Values.server.port }}
          # Everything else → web (SPA)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}-web
                port:
                  number: 80
{{- end }}
