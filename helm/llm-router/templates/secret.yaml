apiVersion: v1
kind: Secret
metadata:
  name: llm-router-secrets
  labels:
    {{- include "llm-router.labels" . | nindent 4 }}
type: Opaque
stringData:
  db-password: {{ .Values.secrets.dbPassword | quote }}
  redis-password: {{ .Values.secrets.redisPassword | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  encryption-key: {{ .Values.secrets.encryptionKey | quote }}
  admin-email: {{ .Values.secrets.adminEmail | quote }}
  admin-password: {{ .Values.secrets.adminPassword | quote }}
