services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: llm-router-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-llm_router}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: llm-router-redis
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --maxmemory 256mb --maxmemory-policy allkeys-lru
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD", "sh", "-c", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    restart: always

  server:
    image: ghcr.io/veritas-calculus/llm-router-platform/server:latest
    build: ./server
    container_name: llm-router-server
    # Server port is now internal-only, proxied by web container
    environment:
      - SERVER_PORT=8080
      - GIN_MODE=release
      - DB_HOST=llm-router-postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-llm_router}
      # Production default: require. docker-compose.dev.yml overrides this
      # to "disable" because the bundled postgres container has no TLS certs.
      # For production, either leave this as require (and terminate TLS at
      # your managed Postgres) or switch to verify-full with mounted CA.
      - DB_SSL_MODE=${DB_SSL_MODE:-require}
      - REDIS_HOST=llm-router-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_EXPIRES_IN=1h
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - LOKI_URL=http://loki:3100
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - ADMIN_NAME=${ADMIN_NAME:-Administrator}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      # ── HashiCorp Vault (Optional) ──
      - VAULT_ADDR=${VAULT_ADDR:-}
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      - VAULT_TRANSIT_KEY=${VAULT_TRANSIT_KEY:-llm-router}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_RPM:-60}
      - REGISTRATION_MODE=${REGISTRATION_MODE:-open}
      - ALLOW_LOCAL_PROVIDERS=${ALLOW_LOCAL_PROVIDERS:-false}
      # ── Langfuse Observability ──
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse-server:3000}
      # ── Prometheus Metrics ──
      - METRICS_ALLOW_UNAUTHENTICATED=${METRICS_ALLOW_UNAUTHENTICATED:-false}
      # ── Sentry Error Tracking ──
      - SENTRY_ENABLED=${SENTRY_ENABLED:-false}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_SAMPLE_RATE=${SENTRY_SAMPLE_RATE:-1.0}
    networks:
      - frontend_net
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  web:
    image: ghcr.io/veritas-calculus/llm-router-platform/web:latest
    build:
      context: ./web
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    container_name: llm-router-web
    ports:
      - "80:8080"
    networks:
      - frontend_net
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/run:uid=10001,gid=10001
      - /var/cache/nginx:uid=10001,gid=10001
      - /var/log/nginx:uid=10001,gid=10001
      - /tmp:uid=10001,gid=10001
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  #  Monitoring -- Prometheus + Grafana
  #
  #  Start with:  docker compose --profile monitoring up -d
  #  Prometheus:  http://localhost:9090
  #  Grafana:     http://localhost:3001  (admin / admin)
  # ════════════════════════════════════════════════════════════════════════

  # -- Alertmanager ------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: llm-router-alertmanager
    profiles: [ "monitoring" ]
    ports:
      - "9093:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - backend_net
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # -- Prometheus ------
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: llm-router-prometheus
    profiles: [ "monitoring" ]
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - backend_net
    depends_on:
      - alertmanager
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # -- Grafana ------
  grafana:
    image: grafana/grafana:11.6.0
    container_name: llm-router-grafana
    profiles: [ "monitoring" ]
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - backend_net
      - frontend_net
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # ════════════════════════════════════════════════════════════════════════
  #  Langfuse v3 — Self-Hosted Observability
  #
  #  Start with:  docker compose --profile langfuse up -d
  #
  #  After boot, open http://localhost:3000, sign up with your email,
  #  create an org + project, then go to Settings -> API Keys and create
  #  a key pair. Copy the Public Key and Secret Key into .env:
  #
  #    LANGFUSE_ENABLED=true
  #    LANGFUSE_PUBLIC_KEY=pk-lf-...
  #    LANGFUSE_SECRET_KEY=sk-lf-...
  #    LANGFUSE_HOST=http://langfuse-server:3000
  #
  #  Then restart the server:  docker compose --profile langfuse up -d server
  # ════════════════════════════════════════════════════════════════════════

  # ── Langfuse Postgres (separate from app Postgres) ──────────────────
  langfuse-postgres:
    image: postgres:16-alpine
    container_name: langfuse-postgres
    profiles: [ "langfuse" ]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:?LANGFUSE_DB_PASSWORD must be set}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U langfuse" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # ── ClickHouse (Langfuse analytics engine) ──────────────────────────
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: langfuse-clickhouse
    profiles: [ "langfuse" ]
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:?LANGFUSE_CLICKHOUSE_PASSWORD must be set}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/keeper.xml:/etc/clickhouse-server/config.d/keeper.xml:ro
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --user langfuse --password $${LANGFUSE_CLICKHOUSE_PASSWORD} --query 'SELECT 1' || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # ── Redis for Langfuse (separate from app Redis) ────────────────────
  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    profiles: [ "langfuse" ]
    command: >
      redis-server --requirepass ${LANGFUSE_REDIS_AUTH:?LANGFUSE_REDIS_AUTH must be set} --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - langfuse_redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 3s
      timeout: 10s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # ── MinIO (S3-compatible storage for Langfuse events/media) ─────────
  langfuse-minio:
    image: minio/minio
    container_name: langfuse-minio
    profiles: [ "langfuse" ]
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_MINIO_USER:-minio}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_PASSWORD:?LANGFUSE_MINIO_PASSWORD must be set}
    volumes:
      - langfuse_minio_data:/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 1s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # ── Langfuse Worker (background job processing) ─────────────────────
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    profiles: [ "langfuse" ]
    environment: &langfuse-env
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-postgres:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      NEXTAUTH_URL: ${LANGFUSE_URL:-http://localhost:3000}
      SALT: ${LANGFUSE_SALT:?LANGFUSE_SALT must be set}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?LANGFUSE_ENCRYPTION_KEY must be set (64-hex-char AES-256 key)}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      # Redis
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${LANGFUSE_REDIS_AUTH}
      # S3 / MinIO — event storage
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_USER:-minio}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      # S3 / MinIO — media storage
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_MINIO_USER:-minio}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
    networks:
      - backend_net
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  # ── Langfuse Server (web UI) ────────────────────────────────────────
  langfuse-server:
    image: langfuse/langfuse:3
    container_name: langfuse-server
    profiles: [ "langfuse" ]
    ports:
      - "3000:3000"
    environment:
      <<: *langfuse-env
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?LANGFUSE_NEXTAUTH_SECRET must be set}
      HOSTNAME: "0.0.0.0"
    networks:
      - backend_net
      - frontend_net
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: unless-stopped

  # ── Automated PostgreSQL Backups (pg_dump + 7-day rotation) ──
  pg-backup:
    image: postgres:16-alpine
    container_name: llm-router-pg-backup
    profiles: [ "backup" ]
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER:-postgres}
      PGPASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      PGDATABASE: ${DB_NAME:-llm_router}
    volumes:
      - postgres_backups:/backups
    networks:
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        while true; do
          FILENAME="/backups/llm_router_$$(date +%Y%m%d_%H%M%S).sql.gz"
          echo "[backup] Starting pg_dump → $$FILENAME"
          pg_dump --no-owner --no-acl | gzip > "$$FILENAME"
          if [ $$? -eq 0 ]; then
            echo "[backup] Success: $$FILENAME ($$(du -h $$FILENAME | cut -f1))"
          else
            echo "[backup] FAILED"
          fi
          # Rotate — keep last 7 days
          find /backups -name "*.sql.gz" -mtime +7 -delete
          # Run every 24 hours
          sleep 86400
        done
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.4
    container_name: llm-router-loki
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 200M
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.4
    container_name: llm-router-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/loki/promtail-config.yaml:/etc/promtail/promtail-config.yaml
    command: -config.file=/etc/promtail/promtail-config.yaml
    networks:
      - backend_net
    deploy:
      resources:
        limits:
          memory: 100M
    restart: unless-stopped

networks:
  frontend_net:
  backend_net:
    internal: true

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  prometheus_data:
  grafana_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_redis_data:
  langfuse_minio_data:
  loki_data:
