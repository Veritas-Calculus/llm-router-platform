services:
  postgres:
    image: postgres:16-alpine
    container_name: llm-router-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: ${DB_NAME:-llm_router}
    # Removed ports mapping for production security
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: llm-router-redis
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set} --maxmemory 256mb --maxmemory-policy allkeys-lru
    # Removed ports mapping for production security
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    restart: always

  server:
    image: ghcr.io/veritas-calculus/llm-router-platform/server:latest
    container_name: llm-router-server
    # Server port is now internal-only, proxied by web container
    environment:
      - SERVER_PORT=8080
      - GIN_MODE=release
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-llm_router}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set}
      - JWT_EXPIRES_IN=24h
      - LOG_LEVEL=info
      - LOG_FORMAT=json
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      - ADMIN_NAME=${ADMIN_NAME:-Administrator}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY must be set}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_REQUESTS_PER_MINUTE=${RATE_LIMIT_RPM:-60}
      - REGISTRATION_MODE=${REGISTRATION_MODE:-open}
    networks:
      - frontend_net
      - backend_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  web:
    image: ghcr.io/veritas-calculus/llm-router-platform/web:latest
    container_name: llm-router-web
    ports:
      - "80:8080"
    networks:
      - frontend_net
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/run:uid=10001,gid=10001
      - /var/cache/nginx:uid=10001,gid=10001
      - /var/log/nginx:uid=10001,gid=10001
      - /tmp:uid=10001,gid=10001
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  frontend_net:
  backend_net:
    internal: true

volumes:
  postgres_data:
  redis_data:
