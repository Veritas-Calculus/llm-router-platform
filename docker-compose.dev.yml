# Development overrides — NOT for production use.
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# This file overrides the default config for LOCAL DEVELOPMENT:
#   - Builds images from source instead of pulling from GHCR
#   - Uses convenience passwords and debug settings
#   - Exposes DB/Redis ports to all interfaces for dev tools

services:
  postgres:
    environment:
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"

  redis:
    command: redis-server --requirepass devpassword
    ports:
      - "6379:6379"

  server:
    image: llm-router-server:dev
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        VERSION: dev
        GIT_COMMIT: local
    environment:
      - DB_PASSWORD=devpassword
      - DB_SSL_MODE=disable
      - REDIS_PASSWORD=devpassword
      - JWT_SECRET=dev-jwt-secret-key-at-least-32-characters-long
      - ADMIN_PASSWORD=DevAdmin123!
      - ENCRYPTION_KEY=dev-32-byte-encryption-key-here!
      - REGISTRATION_MODE=open
      - CORS_ORIGINS=http://localhost:3000,http://localhost:80
      - ALLOW_LOCAL_PROVIDERS=true
      - GIN_MODE=debug
      - LOG_LEVEL=debug

  web:
    image: llm-router-web:dev
    build:
      context: ./web
      dockerfile: Dockerfile
