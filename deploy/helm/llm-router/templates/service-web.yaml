{{- if .Values.web.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-router.fullname" . }}-web
  labels:
    {{- include "llm-router.labels" . | nindent 4 }}
    {{- include "llm-router.web.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.web.service.type }}
  ports:
    - port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "llm-router.web.selectorLabels" . | nindent 4 }}
{{- end }}
