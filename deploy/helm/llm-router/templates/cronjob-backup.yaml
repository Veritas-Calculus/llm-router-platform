{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "llm-router.fullname" . }}-db-backup
  labels:
    {{- include "llm-router.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "llm-router.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: backup
        spec:
          restartPolicy: OnFailure
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: backup
              image: {{ .Values.backup.image | default "postgres:16-alpine" }}
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                runAsNonRoot: true
                runAsUser: 10001
                capabilities:
                  drop:
                  - ALL
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/tmp/llm_router_${TIMESTAMP}.sql.gz"

                  echo "Starting backup at ${TIMESTAMP}..."
                  PGPASSWORD="${DB_PASSWORD}" pg_dump \
                    -h "${DB_HOST}" \
                    -p "${DB_PORT}" \
                    -U "${DB_USER}" \
                    -d "${DB_NAME}" \
                    --no-owner \
                    --no-privileges \
                    | gzip > "${BACKUP_FILE}"

                  echo "Backup created: ${BACKUP_FILE} ($(du -h ${BACKUP_FILE} | cut -f1))"

                  {{- if .Values.backup.s3.bucket }}
                  apk add --no-cache aws-cli
                  aws s3 cp "${BACKUP_FILE}" \
                    "s3://{{ .Values.backup.s3.bucket }}/llm-router/${BACKUP_FILE##*/}" \
                    {{- if .Values.backup.s3.endpoint }}
                    --endpoint-url="{{ .Values.backup.s3.endpoint }}" \
                    {{- end }}
                    --region="{{ .Values.backup.s3.region }}"

                  CUTOFF_DATE=$(date -d "-{{ .Values.backup.retention }} days" +%Y%m%d 2>/dev/null || date -v-{{ .Values.backup.retention }}d +%Y%m%d)
                  aws s3 ls "s3://{{ .Values.backup.s3.bucket }}/llm-router/" \
                    {{- if .Values.backup.s3.endpoint }}
                    --endpoint-url="{{ .Values.backup.s3.endpoint }}" \
                    {{- end }}
                    | while read -r line; do
                      FILE_DATE=$(echo "${line}" | grep -oP '\d{8}' | head -1)
                      if [ -n "${FILE_DATE}" ] && [ "${FILE_DATE}" -lt "${CUTOFF_DATE}" ]; then
                        FILE_NAME=$(echo "${line}" | awk '{print $4}')
                        aws s3 rm "s3://{{ .Values.backup.s3.bucket }}/llm-router/${FILE_NAME}" \
                          {{- if .Values.backup.s3.endpoint }}
                          --endpoint-url="{{ .Values.backup.s3.endpoint }}" \
                          {{- end }}
                      fi
                    done
                  {{- end }}

                  echo "Backup completed successfully."
              envFrom:
                - configMapRef:
                    name: {{ include "llm-router.fullname" . }}
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.existingSecret | default (include "llm-router.fullname" .) }}
                      key: DB_PASSWORD
                {{- if .Values.backup.s3.existingSecret }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3.existingSecret }}
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.s3.existingSecret }}
                      key: AWS_SECRET_ACCESS_KEY
                {{- end }}
{{- end }}
