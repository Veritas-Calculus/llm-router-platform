apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "llm-router.fullname" . }}-config
  labels:
    {{- include "llm-router.labels" . | nindent 4 }}
data:
  SERVER_PORT: {{ .Values.server.port | quote }}
  GIN_MODE: {{ .Values.server.env.GIN_MODE | default "release" | quote }}
  LOG_LEVEL: {{ .Values.server.env.LOG_LEVEL | default "info" | quote }}
  DATABASE_DSN: {{ include "llm-router.databaseDSN" . | quote }}
  REDIS_URL: {{ include "llm-router.redisURL" . | quote }}
  ADMIN_EMAIL: {{ .Values.server.env.ADMIN_EMAIL | default "admin@example.com" | quote }}
  {{- if .Values.langfuse.enabled }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.langfuse.publicKey | quote }}
  LANGFUSE_HOST: {{ .Values.langfuse.host | quote }}
  {{- end }}
