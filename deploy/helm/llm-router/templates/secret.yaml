apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-router.fullname" . }}
  labels:
    {{- include "llm-router.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secret.jwtSecret | quote }}
  ADMIN_PASSWORD: {{ .Values.secret.adminPassword | quote }}
  ENCRYPTION_KEY: {{ .Values.secret.encryptionKey | quote }}
  DB_PASSWORD: {{ .Values.secret.dbPassword | quote }}
  REDIS_PASSWORD: {{ .Values.secret.redisPassword | quote }}
