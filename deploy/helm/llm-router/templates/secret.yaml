{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-router.fullname" . }}
  labels:
    {{- include "llm-router.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── Core ──
  JWT_SECRET: {{ .Values.secret.jwtSecret | quote }}
  ADMIN_PASSWORD: {{ .Values.secret.adminPassword | quote }}
  ENCRYPTION_KEY: {{ .Values.secret.encryptionKey | quote }}
  # ── Database ──
  # When postgresql subchart is enabled, wire the subchart auth.password;
  # otherwise use the standalone secret.dbPassword.
  {{- if .Values.postgresql.enabled }}
  DB_PASSWORD: {{ .Values.postgresql.auth.password | quote }}
  {{- else }}
  DB_PASSWORD: {{ .Values.secret.dbPassword | quote }}
  {{- end }}
  # ── Redis ──
  {{- if .Values.redis.enabled }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | quote }}
  {{- else }}
  REDIS_PASSWORD: {{ .Values.secret.redisPassword | quote }}
  {{- end }}
  # ── Stripe ──
  {{- if .Values.config.stripeEnabled }}
  STRIPE_SECRET_KEY: {{ .Values.secret.stripeSecretKey | quote }}
  STRIPE_PUBLISHABLE_KEY: {{ .Values.secret.stripePublishableKey | quote }}
  STRIPE_WEBHOOK_SECRET: {{ .Values.secret.stripeWebhookSecret | quote }}
  {{- end }}
  # ── WeChat Pay ──
  {{- if .Values.config.wechatPayEnabled }}
  WECHAT_PAY_APP_ID: {{ .Values.secret.wechatPayAppId | quote }}
  WECHAT_PAY_MCH_ID: {{ .Values.secret.wechatPayMchId | quote }}
  WECHAT_PAY_API_V3_KEY: {{ .Values.secret.wechatPayApiV3Key | quote }}
  WECHAT_PAY_SERIAL_NO: {{ .Values.secret.wechatPaySerialNo | quote }}
  WECHAT_PAY_PRIVATE_KEY: {{ .Values.secret.wechatPayPrivateKey | quote }}
  WECHAT_PAY_NOTIFY_URL: {{ .Values.secret.wechatPayNotifyUrl | quote }}
  {{- end }}
  # ── Alipay ──
  {{- if .Values.config.alipayEnabled }}
  ALIPAY_APP_ID: {{ .Values.secret.alipayAppId | quote }}
  ALIPAY_PRIVATE_KEY: {{ .Values.secret.alipayPrivateKey | quote }}
  ALIPAY_PUBLIC_KEY: {{ .Values.secret.alipayPublicKey | quote }}
  ALIPAY_NOTIFY_URL: {{ .Values.secret.alipayNotifyUrl | quote }}
  {{- end }}
  # ── Turnstile ──
  {{- if .Values.config.turnstileEnabled }}
  TURNSTILE_SITE_KEY: {{ .Values.secret.turnstileSiteKey | quote }}
  TURNSTILE_SECRET_KEY: {{ .Values.secret.turnstileSecretKey | quote }}
  {{- end }}
  # ── OAuth2 ──
  {{- if .Values.secret.githubClientId }}
  GITHUB_CLIENT_ID: {{ .Values.secret.githubClientId | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.secret.githubClientSecret | quote }}
  {{- end }}
  {{- if .Values.secret.googleClientId }}
  GOOGLE_CLIENT_ID: {{ .Values.secret.googleClientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.secret.googleClientSecret | quote }}
  {{- end }}
  # ── Observability ──
  {{- if .Values.config.langfuseEnabled }}
  LANGFUSE_PUBLIC_KEY: {{ .Values.secret.langfusePublicKey | quote }}
  LANGFUSE_SECRET_KEY: {{ .Values.secret.langfuseSecretKey | quote }}
  {{- end }}
  {{- if .Values.secret.sentryDsn }}
  SENTRY_DSN: {{ .Values.secret.sentryDsn | quote }}
  {{- end }}
  # ── Vault ──
  {{- if .Values.secret.vaultAddr }}
  VAULT_ADDR: {{ .Values.secret.vaultAddr | quote }}
  VAULT_TOKEN: {{ .Values.secret.vaultToken | quote }}
  VAULT_TRANSIT_KEY: {{ .Values.secret.vaultTransitKey | quote }}
  {{- end }}
  # ── Email ──
  {{- if .Values.config.emailEnabled }}
  EMAIL_SMTP_USER: {{ .Values.secret.emailSmtpUser | default "" | quote }}
  EMAIL_SMTP_PASS: {{ .Values.secret.emailSmtpPass | default "" | quote }}
  {{- end }}
{{- end }}
