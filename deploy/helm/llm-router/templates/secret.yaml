apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llm-router.fullname" . }}-secrets
  labels:
    {{- include "llm-router.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.server.env.JWT_SECRET | quote }}
  ENCRYPTION_KEY: {{ .Values.server.env.ENCRYPTION_KEY | quote }}
  ADMIN_PASSWORD: {{ .Values.server.env.ADMIN_PASSWORD | quote }}
  {{- if .Values.langfuse.enabled }}
  LANGFUSE_SECRET_KEY: {{ .Values.langfuse.secretKey | quote }}
  {{- end }}
