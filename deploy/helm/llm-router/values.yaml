replicaCount: 2

image:
  repository: ghcr.io/veritas-calculus/llm-router-platform/server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llm-gateway.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

config:
  ginMode: release
  logLevel: info
  domain: localhost:8080
  corsOrigins: "http://localhost:5173,http://localhost:8080"
  dbHost: postgres
  dbPort: 5432
  dbUser: postgres
  dbName: llm_router
  dbSslMode: disable
  redisAddr: redis:6379
  redisDb: 0

# Securely inject secrets (These should be replaced or managed by external secrets in production)
secret:
  jwtSecret: ""
  adminPassword: ""
  encryptionKey: ""
  dbPassword: ""
  redisPassword: ""

serviceMonitor:
  enabled: false
  path: /metrics
  interval: 10s
  labels: {}
