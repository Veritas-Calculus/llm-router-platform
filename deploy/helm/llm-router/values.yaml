replicaCount: 2

image:
  repository: ghcr.io/veritas-calculus/llm-router-platform/server
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llm-gateway.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# ─── Pod Disruption Budget ─────────────────────────────────────────
pdb:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1   # alternative to minAvailable

# ─── Init Containers ───────────────────────────────────────────────
initContainers:
  waitForDB:
    enabled: true
    image: busybox:1.36
    timeoutSeconds: 60

# ─── Application Config (Non-Secret) ──────────────────────────────
config:
  # Server
  ginMode: release
  logLevel: info
  corsOrigins: ""
  serverReadTimeoutSeconds: 30
  serverWriteTimeoutSeconds: 600
  allowLocalProviders: false

  # Database
  dbHost: postgres
  dbPort: "5432"
  dbUser: postgres
  dbName: llm_router
  dbSslMode: disable
  dbMaxOpenConns: 100
  dbMaxIdleConns: 10
  dbConnMaxLifetimeMinutes: 60

  # Redis
  redisHost: redis
  redisPort: "6379"
  redisDb: "0"
  redisTlsEnabled: false

  # Admin (non-secret parts)
  adminEmail: admin@example.com
  adminName: Administrator

  # Auth / JWT (durations)
  jwtExpiresIn: 1h
  jwtRefreshExpiresIn: 168h

  # Registration
  registrationMode: open   # open | invite | closed
  inviteCode: ""

  # Rate Limiting
  rateLimitEnabled: true
  rateLimitRequestsPerMinute: 60

  # Health Check
  healthCheckEnabled: true
  healthCheckInterval: 60
  healthCheckTimeout: 10
  healthCheckRetryCount: 3
  healthCheckFailureThreshold: 3

  # Email
  emailEnabled: false
  emailSmtpHost: ""
  emailSmtpPort: 587
  emailSmtpTls: true
  emailFrom: ""
  emailFromName: "LLM Router"

  # Alerts
  alertEnabled: true
  alertWebhookUrl: ""
  alertEmailEnabled: false

  # Frontend
  frontendUrl: "http://localhost:5173"

  # Payment toggles (secrets are in secret section)
  stripeEnabled: false
  wechatPayEnabled: false
  alipayEnabled: false
  alipaySandbox: false

  # CAPTCHA toggle
  turnstileEnabled: false

  # Observability toggles
  langfuseEnabled: false
  langfuseHost: "https://cloud.langfuse.com"
  sentryEnabled: false
  sentryEnvironment: production
  sentrySampleRate: "1.0"
  otelEnabled: false
  otelEndpoint: ""
  otelServiceName: "llm-router-platform"

  # Data Retention
  cleanupHealthRetentionDays: 30
  cleanupAlertRetentionDays: 90
  cleanupAuditRetentionDays: 90

# ─── Secrets ───────────────────────────────────────────────────────
# For production, use existingSecret (populated by External Secrets Operator,
# Sealed Secrets, or kubectl create secret) instead of inlining values here.
existingSecret: ""

secret:
  jwtSecret: ""
  adminPassword: ""
  encryptionKey: ""
  dbPassword: ""
  redisPassword: ""
  # Payment secrets (only set if enabled)
  stripeSecretKey: ""
  stripePublishableKey: ""
  stripeWebhookSecret: ""
  wechatPayAppId: ""
  wechatPayMchId: ""
  wechatPayApiV3Key: ""
  wechatPaySerialNo: ""
  wechatPayPrivateKey: ""
  wechatPayNotifyUrl: ""
  alipayAppId: ""
  alipayPrivateKey: ""
  alipayPublicKey: ""
  alipayNotifyUrl: ""
  # CAPTCHA
  turnstileSiteKey: ""
  turnstileSecretKey: ""
  # OAuth2
  githubClientId: ""
  githubClientSecret: ""
  googleClientId: ""
  googleClientSecret: ""
  # Observability
  langfusePublicKey: ""
  langfuseSecretKey: ""
  sentryDsn: ""
  # Vault
  vaultAddr: ""
  vaultToken: ""
  vaultTransitKey: ""

# ─── Prometheus ServiceMonitor ─────────────────────────────────────
serviceMonitor:
  enabled: false
  path: /internal/metrics
  interval: 10s
  labels: {}

# ═══════════════════════════════════════════════════════════════════
# Infrastructure Dependencies (Bitnami Subcharts)
# ═══════════════════════════════════════════════════════════════════
# When enabled, the chart deploys PostgreSQL/Redis as subcharts and
# automatically wires connection config. When disabled, you must point
# config.dbHost / config.redisHost to your external instances.

# ─── PostgreSQL (Bitnami) ──────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    postgresPassword: "CHANGE_ME"  # REQUIRED — override via --set or existingSecret (never deploy default)
    username: llm_router       # app user
    password: "CHANGE_ME"          # REQUIRED — override via --set or existingSecret (never deploy default)
    database: llm_router
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 2Gi
    # PostgreSQL tuning
    extendedConfiguration: |
      max_connections = 200
      shared_buffers = 512MB
      effective_cache_size = 1536MB
      work_mem = 4MB
      maintenance_work_mem = 128MB
  metrics:
    enabled: false     # set true to enable pg_exporter sidecar

# ─── Redis (Bitnami) ──────────────────────────────────────────────
redis:
  enabled: true
  architecture: standalone     # standalone | replication
  auth:
    enabled: true
    password: "CHANGE_ME"          # REQUIRED — override via --set or existingSecret (never deploy default)
  master:
    persistence:
      enabled: true
      size: 8Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  metrics:
    enabled: false     # set true to enable redis_exporter sidecar
