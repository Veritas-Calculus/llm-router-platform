apiVersion: v2
name: llm-router
description: A Helm chart for the LLM Router Platform — includes PostgreSQL and Redis
type: application
version: 0.2.0
appVersion: "1.0.0"

dependencies:
  # ── PostgreSQL (required) ─────────────────────────────────────
  - name: postgresql
    version: "16.4.6"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  # ── Redis (optional, degrades gracefully) ─────────────────────
  - name: redis
    version: "20.6.3"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
